services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: carbon_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      # 5432 est souvent déjà utilisé localement (service PostgreSQL Windows).
      # On expose donc Postgres Docker sur 5433 pour éviter les conflits.
      - "5433:5432"
    volumes:
      - carbon_pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d carbon_db"]
      interval: 5s
      timeout: 5s
      retries: 10

  carbon-app:
    build: .
    ports:
      - "8080:8080"
    environment:
      - SPRING_PROFILES_ACTIVE=postgres
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-q", "-O", "-", "http://127.0.0.1:8080/actuator/health", "||", "exit", "1"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 45s

volumes:
  carbon_pg_data:
