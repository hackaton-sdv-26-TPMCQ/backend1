# Écoute sur toutes les interfaces (nécessaire pour Docker)
server.address=0.0.0.0

spring.datasource.url=jdbc:h2:mem:carbon_db;DB_CLOSE_ON_EXIT=FALSE;MODE=PostgreSQL
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false

spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

app.jwt.secret=change-this-secret-to-a-very-long-value-1234567890
app.jwt.expiration-ms=14400000

spring.jackson.serialization.WRITE_DATES_AS_TIMESTAMPS=false

# Swagger / OpenAPI (springdoc v2 : UI par défaut à /swagger-ui/index.html)
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.url=/v3/api-docs

# Actuator (health pour Docker)
management.endpoints.web.exposure.include=health
management.endpoint.health.show-details=never